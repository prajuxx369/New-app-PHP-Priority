<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Login - Smart NGO Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="style.css">
</head>
<body onload="updateNav()">
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">
                <i class="fas fa-hand-holding-heart me-2"></i>Smart NGO
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="transparency.html">Transparency</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="d-flex align-items-center" id="navActions">
                    <a href="login.html" class="btn btn-outline-primary me-2 px-4">Login</a>
                    <a href="register.html" class="btn btn-primary px-4 text-white">Register</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4">
                    <h3 class="text-center fw-bold mb-4">Demo Login</h3>
                    <div id="loginError" class="alert alert-danger d-none">Invalid credentials.</div>
                    <form id="loginForm">
                        <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control" value="donor@demo.com" required></div>
                        <div class="mb-3"><label class="form-label">Password</label><input type="password" id="password" class="form-control" value="demo123" required></div>
                        <button type="submit" class="btn btn-primary w-100">Login to Demo</button>
                    </form>
                    <p class="text-center mt-3 small">Use any email/password for this demo.</p>
                </div>
            </div>
        </div>
    </div>
    <footer class="bg-dark text-white py-5 border-top border-secondary mt-5">
        <div class="container">
            <div class="row g-5 text-start">
                <div class="col-md-4">
                    <h4 class="fw-bold text-primary mb-4">Smart NGO</h4>
                    <p class="text-white-50 small">The world's most transparent platform for social good.</p>
                </div>
                <div class="col-md-8 text-md-end">
                    <p class="text-white-50 small m-0">&copy; 2026 Smart NGO Platform. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>
    <script src="app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            // Simple mock login
            const role = email.includes('ngo') ? 'ngo' : (email.includes('admin') ? 'admin' : 'donor');
            localStorage.setItem('currentUser', JSON.stringify({ name: "Demo User", email, role }));
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
